name: Refresh dashboard data

on:
  schedule:
    - cron: '15 * * * *'   # hourly at :15 UTC — Claude-free refresh
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect available credentials
        id: creds
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          [ -n "$HUBSPOT_TOKEN" ] && echo "hubspot=true" >> "$GITHUB_OUTPUT" || echo "hubspot=false" >> "$GITHUB_OUTPUT"
          [ -n "$GOOGLE_REFRESH_TOKEN" ] && echo "google=true" >> "$GITHUB_OUTPUT" || echo "google=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Refresh HubSpot feeds
        if: steps.creds.outputs.hubspot == 'true'
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node scripts/refresh-hubspot.js

      - name: Refresh Gmail + home counters
        if: steps.creds.outputs.google == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/refresh-gmail.js

      - name: Commit and push if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add tasks/ data.js data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Auto-refresh dashboard data"
            git pull --rebase origin main || true
            git push
          fi
